name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type"
        required: false
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

      # https://learn.microsoft.com/en-us/powershell/gallery/concepts/module-prerelease-support?view=powershellget-3.x#identifying-a-module-version-as-a-prerelease
      prerelease:
        description: "Pre-release version string. Examples of supported Prerelease string are: -alpha, -alpha1, -BETA, -update20171020"
        required: false
        default: ""
        type: string


env:
  MODULE_DIR: .\containers-toolkit
  ROOT_DIR: .\

jobs:
  release:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/heads/releases/')
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FIXME: Fix cache not working
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v3
        with:
          path: "C:\\program files\\powershell\\7\\Modules"
          key: ${{ runner.os }}-CTK

      - name: Install required PowerShell modules
        if: steps.cacher.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          $requiredModules = @('ThreadJob')
          $missingModules = $requiredModules | Where-Object { -not (Get-Module -ListAvailable -Name $_) }

          if ($missingModules) {
            Write-Output "Modules to install: $($missingModules -join ', ')"
            Install-Module $missingModules -ErrorAction Stop -AllowClobber -SkipPublisherCheck -Force
          }

      # Get the module version
      - name: Get new version
        id: get-version
        shell: pwsh
        run: |
          $NewSemVer = .\build\scripts\get-newversion.ps1 -ReleaseType ${{ inputs.release-type }}
          echo "NEW_VERSION=$NewSemVer" >> $env:GITHUB_OUTPUT

      # Generate release notes
      - name: Generate release note from template
        id: generate-release-notes
        shell: pwsh
        run: |
          $NewSemVer = "${{ steps.get-version.outputs.NEW_VERSION }}"
          $releaseNotes = [IO.File]::ReadAllText(".\build\hacks\release-notes-template.md")

          if ([string]::IsNullOrWhiteSpace("${{ inputs.prerelease }}")) {
              $releaseNotes = $releaseNotes -replace "__NEW_VERSION__", $NewSemVer
          } else {
              $releaseNotes = $releaseNotes -replace '"__NEW_VERSION__"', "'$NewSemVer' -AllowPrerelease"
          }

          $releaseNotes | Out-File -FilePath ./release-note.txt -Encoding utf8 -Force

      # Update the manifest: version, release notes, prerelease (if any)
      - name: Update CTK module manifest
        id: update-manifest
        shell: pwsh
        run: |
          $NewSemVer = "${{ steps.get-version.outputs.NEW_VERSION }}"
          $ReleaseNotes = Get-Content -Path .\release-note.txt -Raw
          $NewSemVer = .\build\scripts\update-ctkmanifest.ps1 -Version $NewSemVer -Prerelease "${{ inputs.prerelease }}" -ReleaseNotes ''

      # TODO: Use ESRP to sign the scripts
      - name: Sign and archive signed module scripts
        uses: ./.github/actions/sign-scripts
        with:
          AzureKeyVaultUrl: $env:AKVUrl
          AzureKeyVaultClientId: $env:AKVClientId
          AzureKeyVaultClientSecret: $env:AKVClientSecret
          AzureKeyVaultTenantId: $env:AKVTenantId
          AzureKeyVaultCertificate: $env:AKVCertificate
        env:
          AKVUrl: ${{ secrets.AzureKeyVaultUrl }}
          AKVClientId: ${{ secrets.AzureKeyVaultClientId }}
          AKVClientSecret: ${{ secrets.AzureKeyVaultClientSecret }}
          AKVTenantId: ${{ secrets.AzureKeyVaultTenantId }}
          AKVCertificate: ${{ secrets.AzureKeyVaultCertificate }}

      # Create GitHub release
      - name: Create release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Compress ./container-toolkit module directory
          $outputDir = ".\Source code.zip"
          Compress-Archive -Path @(".\containers-toolkit\","LICENSE") -DestinationPath "$outputDir" -Update

          # Get new version tag
          $tag="${{ steps.get-version.outputs.NEW_VERSION }}"
          $vtag = "v${tag}"

          # Create release
          gh release create -F ./release-note.txt --draft --title "${vtag}" "${vtag}" "$outputDir"

      # Publish the module to PSGallery
      - name: Publish containers-toolkit to PS Gallery
        shell: pwsh
        run: |
          Publish-Module -Path ${{ env.MODULE_DIR }} -NuGetApiKey {{ secrets.NUGET_APIKEY }}

      - name: Post results
        shell: pwsh
        run: |
          $tag="${{ steps.get-version.outputs.NEW_VERSION }}"
          echo ":rocket: Successfully released Containers.Toolkit v$tag" >> $env:GITHUB_STEP_SUMMARY
